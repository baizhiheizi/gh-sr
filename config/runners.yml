# Self-hosted runner manager configuration
# Edit this file, then run: gh sr up
# Authentication: run `gh auth login` — gh sr uses the GitHub CLI token only.

hosts:
  # Example hosts:
  #
  # mac-mini:
  #   addr: user@192.168.1.50   # SSH target
  #   os: darwin
  #   arch: arm64
  #
  # win-pc:
  #   addr: user@192.168.1.51   # SSH target (enable OpenSSH Server on Windows)
  #   os: windows
  #   arch: amd64
  #
  # vps-1:
  #   addr: root@203.0.113.10
  #   os: linux
  #   arch: amd64
  #
  # Local host (the machine running gh sr):
  #
  # my-laptop:
  #   addr: local              # runs commands locally instead of over SSH
  #   # os and arch are auto-detected; override if needed

runners:
  # Example runners:
  #
  # - name: my-project-mac
  #   repo: owner/repo
  #   host: mac-mini
  #   count: 1
  #   labels: [self-hosted, macOS, ARM64]
  #
  # - name: my-project-win
  #   repo: owner/repo
  #   host: win-pc
  #   count: 1
  #   labels: [self-hosted, Windows, X64]
  #
  # - name: my-project-ci
  #   repo: owner/repo
  #   host: vps-1
  #   count: 2
  #   labels: [self-hosted, Linux, X64]
  #
  # Organization-level runner (shared across all repos in the org):
  #
  # - name: org-ci
  #   org: my-org
  #   group: ci-pool          # optional; create the group in GitHub org settings first
  #   host: vps-1
  #   count: 4
  #   labels: [self-hosted, Linux, X64]
  #
  # Runner on the local machine:
  #
  # - name: my-project-local
  #   repo: owner/repo
  #   host: my-laptop
  #   count: 1
  #   labels: [self-hosted, Linux, X64]
  #
  # Agentic Workflow runner (GitHub Agentic Workflows with gh-aw):
  # profile: agentic always runs in container mode (DinD): each instance is isolated
  # and every job runs from a pristine inner state. The host only needs Docker (with
  # privileged-container support); gh-aw and all dependencies live inside the image
  # gh sr builds. Use count: N for N concurrent agentic jobs.
  #
  # - name: agentic-runner
  #   repo: owner/repo
  #   host: vps-1
  #   count: 3
  #   profile: agentic   # implies runner_mode: container; "agentic" label auto-added
